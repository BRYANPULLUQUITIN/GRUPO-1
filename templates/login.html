{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - The Venue</title>

    <link rel="stylesheet" href="{% static 'public/styles/bootstrap-4.1.2/bootstrap.min.css' %}">

    <style>
        body{
            background:#f8f9fa;
        }

        .login-container{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .card{
            width:450px;
            border:none;
            border-radius:15px;
        }

        .card-header{
            text-align:center;
            font-size:24px;
            font-weight:bold;
        }

        .btn-login{
            background:#c49b63;
            color:white;
            font-weight:bold;
        }

        .btn-login:hover{
            background:#b38850;
            color:white;
        }
    </style>
</head>
<body>

<div class="container login-container">

    <div class="card shadow">

        <div class="card-header bg-dark text-white">
            🍽 Restaurante The Venue
        </div>

        <div class="card-body">

            <h4 class="text-center mb-4">Iniciar Sesión</h4>

            {% if form.errors %}
                <div class="alert alert-danger">
                    Usuario o contraseña incorrectos.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="form-group mb-3">
                    <label>Usuario</label>
                    {{ form.username }}
                </div>

                <div class="form-group mb-3">
                    <label>Contraseña</label>
                    {{ form.password }}
                </div>

                <button type="submit" class="btn btn-login btn-block">
                    Iniciar Sesión
                </button>

            </form>

            <div class="text-center mt-3">
                <a href="{% url 'home' %}">Volver al inicio</a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
