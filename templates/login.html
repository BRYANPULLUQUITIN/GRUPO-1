<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Acceso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #7b1a3e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 20px;
        }

        .login-card {
            display: flex;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
            min-height: 520px;
            animation: fadeInUp 0.7s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .side-panel {
            width: 200px;
            flex-shrink: 0;
            background: linear-gradient(160deg, #c2185b 0%, #e91e8c 40%, #f8bbd9 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            position: relative;
            overflow: hidden;
        }

        .side-panel::before {
            content: '';
            position: absolute;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.07);
            top: -60px;
            left: -80px;
        }

        .side-panel::after {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            bottom: -40px;
            right: -60px;
        }

        .side-btn {
            width: 130px;
            padding: 13px 0;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.2px;
            cursor: pointer;
            border: none;
            transition: all 0.25s;
            position: relative;
            z-index: 1;
        }

        .side-btn.active {
            background: white;
            color: #c2185b;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
        }

        .side-btn.inactive {
            background: transparent;
            color: rgba(255, 255, 255, 0.8);
            border: 1.5px solid rgba(255, 255, 255, 0.5);
        }

        .side-btn.inactive:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .main-panel {
            flex: 1;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 36px 44px;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c2185b, #f06292);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .avatar i {
            font-size: 32px;
            color: white;
        }

        .main-title {
            font-size: 22px;
            font-weight: 700;
            color: #c2185b;
            margin-bottom: 26px;
            letter-spacing: 1.5px;
        }

        .tab-content {
            display: none;
            width: 100%;
            animation: fadeSlide 0.35s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 22px;
            position: relative;
            border-bottom: 1.5px solid #ddd;
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: #c2185b;
        }

        .input-group .icon {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            color: #bbb;
            font-size: 16px;
            transition: color 0.2s;
        }

        .input-group:focus-within .icon {
            color: #c2185b;
        }

        .input-group input {
            width: 100%;
            padding: 9px 9px 9px 30px;
            border: none;
            outline: none;
            font-size: 14px;
            background: transparent;
            color: #333;
        }

        .input-group input::placeholder {
            color: #bbb;
            font-size: 13px;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 12px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 7px;
            color: #777;
            cursor: pointer;
            font-weight: 500;
        }

        .checkbox input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: #c2185b;
            cursor: pointer;
        }

        .forgot-password {
            color: #c2185b;
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .forgot-password:hover {
            opacity: 0.75;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #c2185b, #e91e8c);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: all 0.25s;
            margin-bottom: 22px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(194, 24, 91, 0.38);
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            color: #bbb;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .social-buttons {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            flex: 1;
            padding: 11px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }

        .social-btn:hover {
            border-color: #c2185b;
            background: #fce4ec;
            transform: translateY(-1px);
        }

        .social-btn i { font-size: 20px; }
        .social-btn.google i   { color: #DB4437; }
        .social-btn.facebook i { color: #4267B2; }

        .error-message {
            background: #fce4ec;
            color: #b71c1c;
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 9px;
            border-left: 3px solid #c2185b;
            animation: shake 0.4s ease;
        }

        .success-message {
            background: #e8f5e9;
            color: #1b5e20;
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 9px;
            border-left: 3px solid #4caf50;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-5px); }
            75%       { transform: translateX(5px); }
        }

        @media (max-width: 600px) {
            .login-card { flex-direction: column; min-height: auto; }
            .side-panel {
                width: 100%;
                flex-direction: row;
                padding: 20px;
                gap: 16px;
                min-height: 70px;
            }
            .side-panel::before,
            .side-panel::after { display: none; }
            .main-panel { padding: 28px 24px; }
            .social-btn span { display: none; }
            .social-btn { padding: 13px; }
            .options { flex-direction: column; align-items: flex-start; gap: 10px; }
        }

        @media (max-width: 380px) {
            .container { padding: 10px; }
            .main-panel { padding: 22px 16px; }
            .main-title { font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="login-card">

        <!-- Panel lateral -->
        <div class="side-panel">
            <button class="side-btn active" id="btnLogin" onclick="switchTab('login')">LOGIN</button>
            <button class="side-btn inactive" id="btnSignin" onclick="switchTab('signin')">SIGN IN</button>
        </div>

        <!-- Panel principal -->
        <div class="main-panel">

            <div class="avatar">
                <i class="fas fa-user-circle"></i>
            </div>

            <div class="main-title" id="mainTitle">LOGIN</div>

            <!-- Mensajes Django (error / success desde el backend) -->
            <div id="msgArea" style="width:100%">
                {% if messages %}
                    {% for msg in messages %}
                        <div class="{% if msg.tags == 'error' %}error-message{% else %}success-message{% endif %}">
                            <i class="fas fa-{% if msg.tags == 'error' %}exclamation-circle{% else %}check-circle{% endif %}"></i>
                            {{ msg }}
                        </div>
                    {% endfor %}
                {% endif %}
            </div>

            <!-- ══ TAB LOGIN ══ -->
            <div id="loginTab" class="tab-content active">
                <form id="loginForm" method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="login">

                    <div class="input-group">
                        <input type="email" name="email" id="loginEmail"
                               placeholder="Email" required
                               value="{{ request.POST.email|default:'' }}">
                        <i class="fas fa-envelope icon"></i>
                    </div>

                    <div class="input-group">
                        <input type="password" name="password" id="loginPassword"
                               placeholder="Contraseña" required>
                        <i class="fas fa-lock icon"></i>
                    </div>

                    <div class="options">
                        <label class="checkbox">
                            <input type="checkbox" id="rememberMe" name="remember">
                            <span>Recordar</span>
                        </label>
                        <a class="forgot-password" href="#">¿Olvidó la contraseña?</a>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">INICIAR SESIÓN</button>
                </form>

                <div class="divider">Iniciar con otra cuenta</div>
                <div class="social-buttons">
                    <button class="social-btn google" onclick="socialLogin('Google')">
                        <i class="fab fa-google"></i><span>Google</span>
                    </button>
                    <button class="social-btn facebook" onclick="socialLogin('Facebook')">
                        <i class="fab fa-facebook-f"></i><span>Facebook</span>
                    </button>
                </div>
            </div>

            <!-- ══ TAB REGISTRO ══ -->
            <div id="signinTab" class="tab-content">
                <form id="signinForm" method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="register">

                    <div class="input-group">
                        <input type="text" name="full_name" id="signinName"
                               placeholder="Nombre completo" required>
                        <i class="fas fa-user icon"></i>
                    </div>

                    <div class="input-group">
                        <input type="email" name="email" id="signinEmail"
                               placeholder="Email" required>
                        <i class="fas fa-envelope icon"></i>
                    </div>

                    <div class="input-group">
                        <input type="password" name="password" id="signinPassword"
                               placeholder="Contraseña" required>
                        <i class="fas fa-lock icon"></i>
                    </div>

                    <div class="input-group">
                        <input type="password" name="confirm_password" id="signinConfirmPassword"
                               placeholder="Confirmar Contraseña" required>
                        <i class="fas fa-check-circle icon"></i>
                    </div>

                    <button type="submit" class="login-btn" id="signinBtn">REGISTRARSE</button>
                </form>

                <div class="divider">Registrarse con otra cuenta</div>
                <div class="social-buttons">
                    <button class="social-btn google" onclick="socialLogin('Google')">
                        <i class="fab fa-google"></i><span>Google</span>
                    </button>
                    <button class="social-btn facebook" onclick="socialLogin('Facebook')">
                        <i class="fab fa-facebook-f"></i><span>Facebook</span>
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // ── Abrir tab correcto si Django devuelve error de registro ──
    (function () {
        var action = "{{ request.POST.action|default:'' }}";
        if (action === 'register') switchTab('signin');
    })();

    // ── Cambiar pestaña ──────────────────────────────────────────
    function switchTab(tab) {
        document.getElementById('loginTab').classList.toggle('active', tab === 'login');
        document.getElementById('signinTab').classList.toggle('active', tab === 'signin');
        document.getElementById('mainTitle').textContent = tab === 'login' ? 'LOGIN' : 'SIGN IN';
        document.getElementById('btnLogin').className  = 'side-btn ' + (tab === 'login'  ? 'active' : 'inactive');
        document.getElementById('btnSignin').className = 'side-btn ' + (tab === 'signin' ? 'active' : 'inactive');
        clearMessages();
    }

    // ── Mensajes JS (solo validación frontend) ───────────────────
    function clearMessages() {
        document.getElementById('msgArea').innerHTML = '';
    }

    function showError(message) {
        clearMessages();
        document.getElementById('msgArea').innerHTML =
            `<div class="error-message"><i class="fas fa-exclamation-circle"></i>${message}</div>`;
    }

    function showSuccess(message) {
        clearMessages();
        document.getElementById('msgArea').innerHTML =
            `<div class="success-message"><i class="fas fa-check-circle"></i>${message}</div>`;
    }

    // ── Validaciones ─────────────────────────────────────────────
    function validateEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function validatePassword(password) {
        return password.length >= 6;
    }

    // ── LOGIN: solo validación visual, POST lo maneja Django ─────
    document.getElementById('loginForm').addEventListener('submit', function (e) {
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!validateEmail(email)) {
            e.preventDefault();
            showError('Por favor ingrese un correo electrónico válido.');
            return;
        }
        if (!validatePassword(password)) {
            e.preventDefault();
            showError('La contraseña debe tener al menos 6 caracteres.');
            return;
        }

        // Recordar email
        if (document.getElementById('rememberMe').checked) {
            localStorage.setItem('rememberedEmail', email);
        } else {
            localStorage.removeItem('rememberedEmail');
        }

        // Deshabilitar botón para evitar doble envío
        document.getElementById('loginBtn').disabled = true;
        document.getElementById('loginBtn').textContent = 'Verificando...';
        // El form hace POST a Django — Django verifica y redirige a /splash/
    });

    // ── REGISTRO: solo validación visual, POST lo maneja Django ──
    document.getElementById('signinForm').addEventListener('submit', function (e) {
        const name            = document.getElementById('signinName').value.trim();
        const email           = document.getElementById('signinEmail').value.trim();
        const password        = document.getElementById('signinPassword').value;
        const confirmPassword = document.getElementById('signinConfirmPassword').value;

        if (!name || name.length < 3) {
            e.preventDefault();
            showError('Por favor ingrese un nombre válido (mínimo 3 caracteres).');
            return;
        }
        if (!validateEmail(email)) {
            e.preventDefault();
            showError('Por favor ingrese un correo electrónico válido.');
            return;
        }
        if (!validatePassword(password)) {
            e.preventDefault();
            showError('La contraseña debe tener al menos 6 caracteres.');
            return;
        }
        if (password !== confirmPassword) {
            e.preventDefault();
            showError('Las contraseñas no coinciden.');
            return;
        }

        document.getElementById('signinBtn').disabled = true;
        document.getElementById('signinBtn').textContent = 'Registrando...';
    });

    // ── Social login (placeholder) ────────────────────────────────
    function socialLogin(provider) {
        showSuccess(`Redirigiendo a ${provider}...`);
        setTimeout(() => {
            console.log(`Login con ${provider} — integración pendiente`);
        }, 1000);
    }

    // ── Recordar email al cargar ──────────────────────────────────
    (function loadRememberedEmail() {
        var remembered = localStorage.getItem('rememberedEmail');
        if (remembered) {
            document.getElementById('loginEmail').value = remembered;
            document.getElementById('rememberMe').checked = true;
        }
    })();
</script>

</body>
</html>
