<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Acceso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Decoración de fondo */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            top: -150px;
            right: -150px;
        }

        body::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            bottom: -100px;
            left: -100px;
        }

        /* Contenedor principal */
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Tarjeta de login */
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header con logo */
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
        }

        .logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 35px;
            font-weight: bold;
            color: #667eea;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .login-header h1 {
            color: white;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .login-header p {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }

        /* Pestañas */
        .tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
            background: white;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            position: relative;
            background: white;
            border: none;
            font-size: 16px;
        }

        .tab.active {
            color: #667eea;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }

        /* Contenido de las pestañas */
        .tab-content {
            padding: 30px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Grupos de formulario */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 45px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
            background: #f8f9fa;
        }

        .input-group input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        /* Opciones adicionales */
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #666;
        }

        .checkbox input {
            cursor: pointer;
            accent-color: #667eea;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* Botón de login */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Separador */
        .divider {
            text-align: center;
            position: relative;
            margin-bottom: 25px;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 70px);
            height: 1px;
            background: #e1e5e9;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #999;
            font-size: 13px;
        }

        /* Botones sociales */
        .social-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e1e5e9;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 500;
            color: #555;
            transition: all 0.3s;
            font-size: 14px;
        }

        .social-btn i {
            font-size: 18px;
        }

        .social-btn.google i {
            color: #DB4437;
        }

        .social-btn.facebook i {
            color: #4267B2;
        }

        .social-btn:hover {
            border-color: #667eea;
            background: #f8f9fa;
            transform: translateY(-2px);
        }

        /* Mensajes de error */
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Registro exitoso */
        .success-message {
            background: #dcfce7;
            color: #16a34a;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Términos y condiciones */
        .terms {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }

        .terms a {
            color: #667eea;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .tab-content {
                padding: 20px;
            }
            
            .social-btn span {
                display: none;
            }
            
            .social-btn {
                padding: 12px;
            }
            
            .social-btn i {
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-code"></i>
                </div>
                <h1>Bienvenido</h1>
                <p>Inicia sesión para continuar</p>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">LOGIN</button>
                <button class="tab" onclick="switchTab('signin')">SIGN IN</button>
            </div>

            <!-- Login Tab -->
            <div id="loginTab" class="tab-content active">
                <form id="loginForm">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="Email" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Password" required>
                    </div>

                    <div class="options">
                        <label class="checkbox">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember Me</span>
                        </label>
                        <a href="#" class="forgot-password" onclick="showForgotPassword()">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-btn">LOGIN</button>
                </form>

                <div class="divider">
                    <span>Or Login With</span>
                </div>

                <div class="social-buttons">
                    <button class="social-btn google" onclick="socialLogin('google')">
                        <i class="fab fa-google"></i>
                        <span>Google</span>
                    </button>
                    <button class="social-btn facebook" onclick="socialLogin('facebook')">
                        <i class="fab fa-facebook-f"></i>
                        <span>facebook</span>
                    </button>
                </div>
            </div>

            <!-- Sign In Tab -->
            <div id="signinTab" class="tab-content">
                <form id="signinForm">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signinName" placeholder="Full Name" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signinEmail" placeholder="Email" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signinPassword" placeholder="Password" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="signinConfirmPassword" placeholder="Confirm Password" required>
                    </div>

                    <button type="submit" class="login-btn">SIGN IN</button>
                </form>

                <div class="divider">
                    <span>Or Sign Up With</span>
                </div>

                <div class="social-buttons">
                    <button class="social-btn google" onclick="socialLogin('google')">
                        <i class="fab fa-google"></i>
                        <span>Google</span>
                    </button>
                    <button class="social-btn facebook" onclick="socialLogin('facebook')">
                        <i class="fab fa-facebook-f"></i>
                        <span>facebook</span>
                    </button>
                </div>
            </div>

            <div class="terms">
                By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </div>
        </div>
    </div>

    <script>
        // Cambiar entre pestañas
        function switchTab(tab) {
            // Actualizar pestañas
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('loginTab').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('signinTab').classList.add('active');
            }
            
            // Limpiar mensajes de error
            clearMessages();
        }
        
        // Limpiar mensajes
        function clearMessages() {
            const messages = document.querySelectorAll('.error-message, .success-message');
            messages.forEach(msg => msg.remove());
        }
        
        // Mostrar mensaje de error
        function showError(message, containerId) {
            clearMessages();
            const container = document.getElementById(containerId);
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
            container.insertBefore(errorDiv, container.firstChild);
            
            setTimeout(() => {
                errorDiv.remove();
            }, 5000);
        }
        
        // Mostrar mensaje de éxito
        function showSuccess(message, containerId) {
            clearMessages();
            const container = document.getElementById(containerId);
            const successDiv = document.createElement('div');
            successDiv.className = 'success-message';
            successDiv.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            container.insertBefore(successDiv, container.firstChild);
            
            setTimeout(() => {
                successDiv.remove();
            }, 3000);
        }
        
        // Validar email
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        // Validar contraseña
        function validatePassword(password) {
            return password.length >= 6;
        }
        
        // Login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!validateEmail(email)) {
                showError('Please enter a valid email address', 'loginTab');
                return;
            }
            
            if (!validatePassword(password)) {
                showError('Password must be at least 6 characters', 'loginTab');
                return;
            }
            
            // Aquí iría la lógica de autenticación con el backend
            // Simulación de login exitoso
            showSuccess('Login successful! Redirecting...', 'loginTab');
            
            // Guardar sesión
            if (rememberMe) {
                localStorage.setItem('rememberedEmail', email);
            } else {
                localStorage.removeItem('rememberedEmail');
            }
            
            setTimeout(() => {
                // Redirigir al dashboard
                window.location.href = '/dashboard/';
            }, 1500);
        });
        
        // Sign In (Registro)
        document.getElementById('signinForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('signinName').value;
            const email = document.getElementById('signinEmail').value;
            const password = document.getElementById('signinPassword').value;
            const confirmPassword = document.getElementById('signinConfirmPassword').value;
            
            if (!name || name.length < 3) {
                showError('Please enter your full name (min 3 characters)', 'signinTab');
                return;
            }
            
            if (!validateEmail(email)) {
                showError('Please enter a valid email address', 'signinTab');
                return;
            }
            
            if (!validatePassword(password)) {
                showError('Password must be at least 6 characters', 'signinTab');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match', 'signinTab');
                return;
            }
            
            // Aquí iría la lógica de registro con el backend
            showSuccess('Account created successfully! Please login.', 'signinTab');
            
            setTimeout(() => {
                switchTab('login');
                // Limpiar formulario de registro
                document.getElementById('signinForm').reset();
            }, 2000);
        });
        
        // Social login
        function socialLogin(provider) {
            showSuccess(`Redirecting to ${provider} login...`, provider === 'login' ? 'loginTab' : 'signinTab');
            
            setTimeout(() => {
                // Aquí iría la redirección a OAuth
                // window.location.href = `/auth/${provider}/`;
                console.log(`Logging in with ${provider}`);
            }, 1000);
        }
        
        // Forgot password
        function showForgotPassword() {
            const email = prompt('Please enter your email address to reset your password:');
            if (email && validateEmail(email)) {
                showSuccess('Password reset link has been sent to your email!', 'loginTab');
            } else if (email) {
                showError('Please enter a valid email address', 'loginTab');
            }
        }
        
        // Cargar email recordado
        function loadRememberedEmail() {
            const rememberedEmail = localStorage.getItem('rememberedEmail');
            if (rememberedEmail) {
                document.getElementById('loginEmail').value = rememberedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        }
        
        // Agregar efectos visuales a los inputs
        document.querySelectorAll('.input-group input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'translateX(5px)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'translateX(0)';
            });
        });
        
        // Inicializar
        loadRememberedEmail();
        
        // Prevenir envío de formulario con Enter si es inválido
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    this.querySelector('button[type="submit"]').click();
                }
            });
        });
    </script>
</body>
</html>
